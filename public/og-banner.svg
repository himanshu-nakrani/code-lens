      <stop offset="0%" stop-color="#4dff9a" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#4dff9a" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0b0f14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121820"/>
      <stop offset="100%" stop-color="#0b0f14"/>
